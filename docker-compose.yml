version: '3.8'

services:
  db:
    image: postgres:15
    container_name: banking_postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgre_sql
      - POSTGRES_DB=eBank
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql