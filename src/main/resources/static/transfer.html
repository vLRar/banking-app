<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Banking App</title>
    <!-- Bootstrap doar pentru structura de baza -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h1>Banking App</h1>
    <h2>Transfer</h2>

    <div id="res" class="my-2"></div>

    <div>
        Source IBAN <br>
        <input type="text" id="s" value="RO88EBNK2481632640623618"> <br>

        Destination IBAN <br>
        <input type="text" id="d" value="RO45EBNK3927030729364416"> <br>

        Amount <br>
        <input type="number" id="a" value="100"> <br>

        Description <br>
        <input type="text" id="desc"> <br>

        <button onclick="go()" class="mt-2">Execute Transfer</button>
    </div>
</div>

<script>
    async function go() {
     // Luăm valorile EXACT în momentul în care se apasă butonul
     const sourceIban = document.getElementById('s').value;
     const destIban = document.getElementById('d').value;
     const amountValue = document.getElementById('a').value; // AICI citim suma din căsuță
     const descValue = document.getElementById('desc').value;

     const url = `/api/transfer?sourceIban=${sourceIban}&destinationIban=${destIban}&amount=${amountValue}&description=${encodeURIComponent(descValue)}`;

     const r = await fetch(url, { method: 'POST' });
     const t = await r.text();

     document.getElementById('res').innerHTML = `<div class="alert alert-${r.ok ? 'success' : 'danger'} p-1">${t}</div>`;
 }
</script>

</body>
</html>
